<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Exercise 5 - Working with Events</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    #colorBox {
      width: 250px;
      height: 150px;
      border: 2px solid #ccc;
      border-radius: 10px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      transition: background-color 0.3s;
    }
  </style>
</head>
<body class="container mt-5">
  <h1 class="mb-4">Exercise 5: Events</h1>

  <button id="colorBtn" class="btn btn-primary">Click to turn Red</button>
  <p class="text-muted mt-2">Double-click the box to reset to white.</p>

  <div id="colorBox">Color Box</div>

  <script>
    $(document).ready(function () {
      $('#colorBtn').click(function () {
        $('#colorBox').css('background-color', 'red').text('Red!');
      });

      $('#colorBox').dblclick(function () {
        $(this).css('background-color', 'white').text('Color Box');
      });
    });
  </script>
</body>
</html>
