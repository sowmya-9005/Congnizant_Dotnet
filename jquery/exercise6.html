<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Exercise 6 - Event Helpers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    #eventBox {
      width: 300px;
      height: 100px;
      border: 2px solid #3498db;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-bottom: 16px;
    }
  </style>
</head>
<body class="container mt-5">
  <h1 class="mb-4">Exercise 6: Event Helpers</h1>

  <div id="eventBox">Interact with me</div>

  <input type="text" id="keyInput" class="form-control mb-3" placeholder="Type something here..." style="max-width:300px;" />

  <p id="statusMsg" class="text-muted">Status: waiting...</p>

  <script>
    $(document).ready(function () {
      $('#eventBox').click(function () {
        $(this).css('background-color', '#3498db').css('color', 'white');
        $('#statusMsg').text('Status: clicked — turned blue');
      });

      $('#eventBox').dblclick(function () {
        $(this).css('background-color', '#e74c3c').css('color', 'white');
        $('#statusMsg').text('Status: double-clicked — turned red');
      });

      $('#eventBox').mouseenter(function () {
        $(this).css('background-color', '#eaf4fb');
        $('#statusMsg').text('Status: mouse entered');
      });

      $('#eventBox').mouseleave(function () {
        $(this).css('background-color', '').css('color', '');
        $('#statusMsg').text('Status: mouse left — reset');
      });

      $('#keyInput').keypress(function (e) {
        $('#statusMsg').text('Status: key pressed — "' + e.key + '" (code ' + e.which + ')');
      });
    });
  </script>
</body>
</html>
