<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Exercise 2 - The $() Function</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="container mt-5">
  <h1 id="heading">Original Heading</h1>
  <p id="para1">This paragraph will be hidden when the button is clicked.</p>
  <p id="para2">This paragraph stays visible.</p>
  <button id="actionBtn" class="btn btn-primary">Click Me</button>

  <script>
    $(document).ready(function () {
      $('#heading').text('Heading Changed by jQuery');

      $('#actionBtn').click(function () {
        $('#para1').hide();
      });
    });
  </script>
</body>
</html>
