<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Exercise 4 - DOM Manipulation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="container mt-5">
  <h1 class="mb-4">Exercise 4: DOM Manipulation</h1>

  <form id="itemForm" class="d-flex gap-2 mb-3">
    <input type="text" id="itemInput" class="form-control" placeholder="Enter item..." />
    <button type="submit" class="btn btn-primary">Add Item</button>
  </form>

  <ul id="itemList" class="list-group mb-3"></ul>

  <button id="removeAll" class="btn btn-danger">Remove All</button>

  <script>
    $(document).ready(function () {
      $('#itemForm').submit(function (e) {
        e.preventDefault();
        var value = $('#itemInput').val().trim();
        if (value === '') return;
        var li = $('<li>').addClass('list-group-item').text(value);
        $('#itemList').append(li);
        $('#itemInput').val('');
      });

      $('#removeAll').click(function () {
        $('#itemList').empty();
      });
    });
  </script>
</body>
</html>
