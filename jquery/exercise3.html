<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Exercise 3 - jQuery Methods</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    .box {
      width: 200px;
      height: 80px;
      margin: 8px 0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
    }
    #box1 { background: #3498db; }
    #box2 { background: #2ecc71; }
    #box3 { background: #e74c3c; }
  </style>
</head>
<body class="container mt-5">
  <h1 class="mb-4">Exercise 3: jQuery Methods</h1>

  <div id="box1" class="box">Box 1</div>
  <div id="box2" class="box">Box 2</div>
  <div id="box3" class="box">Box 3</div>

  <div class="d-flex flex-wrap gap-2 mt-4">
    <button id="btnHide"    class="btn btn-secondary">Hide Box 1</button>
    <button id="btnShow"    class="btn btn-secondary">Show Box 1</button>
    <button id="btnFadeOut" class="btn btn-secondary">FadeOut Box 2</button>
    <button id="btnFadeIn"  class="btn btn-secondary">FadeIn Box 2</button>
    <button id="btnToggle"  class="btn btn-secondary">Toggle Box 3</button>
    <button id="btnChain"   class="btn btn-warning">Chain: Box 1 SlideUp → SlideDown</button>
  </div>

  <script>
    $(document).ready(function () {
      $('#btnHide').click(function ()    { $('#box1').hide(); });
      $('#btnShow').click(function ()    { $('#box1').show(); });
      $('#btnFadeOut').click(function () { $('#box2').fadeOut(); });
      $('#btnFadeIn').click(function ()  { $('#box2').fadeIn(); });
      $('#btnToggle').click(function ()  { $('#box3').toggle(); });

      $('#btnChain').click(function () {
        $('#box1').slideUp().delay(1000).slideDown();
      });
    });
  </script>
</body>
</html>
